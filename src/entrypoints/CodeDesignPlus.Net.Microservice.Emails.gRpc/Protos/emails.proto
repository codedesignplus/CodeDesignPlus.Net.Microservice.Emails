syntax = "proto3";

option csharp_namespace = "CodeDesignPlus.Net.Microservice.Emails.gRpc";

package Emails;

service Emails {
  rpc RenderTemplate (RenderTemplateRequest) returns (RenderTemplateResponse);
  rpc GeneratePdf (GeneratePdfRequest) returns (GeneratePdfResponse);
}

message RenderTemplateRequest {
  string templateType = 1;
  map<string, string> values = 2;
}

message RenderTemplateResponse {
  string renderedHtml = 1;
  string subject = 2;
  bool success = 3;
  string error = 4;
}

message GeneratePdfRequest {
  string templateType = 1;
  map<string, string> values = 2;
  string tenant = 3;
}

message GeneratePdfResponse {
  string id = 1;
  string name = 2;
  string target = 3;
  string signedUrl = 4;
  bool success = 5;
  string error = 6;
}
